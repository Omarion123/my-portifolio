<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Omar Khouri — Software Engineer</title>
  <meta name="description" content="Portfolio of Omar Khouri, full-stack software engineer. Selected work, writing, and contact." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="styles-public.css" />
  <link rel="stylesheet" href="styles-admin.css" />
</head>
<body data-theme="dark">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="public.jsx"></script>
  <script type="text/babel" src="admin.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "light",
      "accent": "violet",
      "density": "compact",
      "motion": true,
      "heroVariant": "editorial"
    }/*EDITMODE-END*/;

    const ACCENTS = {
      violet:  { a: "oklch(0.7 0.18 290)", b: "oklch(0.78 0.13 200)" },
      cyan:    { a: "oklch(0.78 0.13 200)", b: "oklch(0.78 0.16 160)" },
      amber:   { a: "oklch(0.82 0.16 70)",  b: "oklch(0.7 0.2 25)"   },
      emerald: { a: "oklch(0.78 0.14 150)", b: "oklch(0.78 0.13 200)"},
      rose:    { a: "oklch(0.7 0.2 25)",    b: "oklch(0.7 0.18 350)" },
    };

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [route, setRoute] = useState(() => (location.hash === "#admin" ? "admin" : "site"));
      const [data, setData] = useState(SEED_DATA);

      // Persist data through reloads (admin edits feel real)
      useEffect(() => {
        try {
          const saved = localStorage.getItem("portfolio_data_v1");
          if (saved) setData(JSON.parse(saved));
        } catch {}
      }, []);
      useEffect(() => {
        try { localStorage.setItem("portfolio_data_v1", JSON.stringify(data)); } catch {}
      }, [data]);

      // Apply theme + tokens
      useEffect(() => {
        document.body.dataset.theme = t.theme;
        const root = document.documentElement;
        const ac = ACCENTS[t.accent] || ACCENTS.violet;
        root.style.setProperty("--accent", ac.a);
        root.style.setProperty("--accent-2", ac.b);
        root.style.setProperty("--accent-soft", `color-mix(in oklch, ${ac.a} 18%, transparent)`);
        root.style.setProperty("--accent-glow", `color-mix(in oklch, ${ac.a} 35%, transparent)`);
        root.style.setProperty("--d", t.density === "compact" ? 0.7 : t.density === "comfy" ? 1.2 : 1);
        root.style.setProperty("--motion", t.motion ? 1 : 0);
      }, [t]);

      useEffect(() => {
        const onHash = () => setRoute(location.hash === "#admin" ? "admin" : "site");
        window.addEventListener("hashchange", onHash);
        return () => window.removeEventListener("hashchange", onHash);
      }, []);

      const goAdmin = () => { location.hash = "admin"; setRoute("admin"); };
      const goSite = () => { location.hash = ""; setRoute("site"); window.scrollTo({ top: 0 }); };

      return (
        <React.Fragment>
          {route === "site" ? (
            <React.Fragment>
              <Nav data={data} theme={t.theme} onTheme={() => setTweak("theme", t.theme === "dark" ? "light" : "dark")} route={route} onRoute={(r) => r === "admin" ? goAdmin() : goSite()} />
              <Hero data={data} />
              <About data={data} />
              <Projects data={data} />
              <Skills data={data} />
              <Experience data={data} />
              <EduCerts data={data} />
              <Blog data={data} />
              <Contact data={data} />
              <Footer data={data} />
            </React.Fragment>
          ) : (
            <Admin data={data} setData={setData} onExit={goSite} />
          )}

          <TweaksPanel>
            <TweakSection label="Theme" />
            <TweakRadio label="Mode" value={t.theme}
              options={["dark", "light"]}
              onChange={(v) => setTweak("theme", v)} />
            <TweakSelect label="Accent" value={t.accent}
              options={["violet", "cyan", "amber", "emerald", "rose"]}
              onChange={(v) => setTweak("accent", v)} />

            <TweakSection label="Layout" />
            <TweakRadio label="Density" value={t.density}
              options={["compact", "regular", "comfy"]}
              onChange={(v) => setTweak("density", v)} />

            <TweakSection label="Motion" />
            <TweakToggle label="Animations" value={t.motion}
              onChange={(v) => setTweak("motion", v)} />

            <TweakSection label="Navigate" />
            <TweakButton label={route === "site" ? "Open admin →" : "← Back to site"}
              onClick={() => route === "site" ? goAdmin() : goSite()} />
            <TweakButton label="Reset content"
              onClick={() => { localStorage.removeItem("portfolio_data_v1"); setData(SEED_DATA); }} />
          </TweaksPanel>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
