<div class="min-h-screen bg-neutral-950 flex items-center justify-center px-6">
  <div class="w-full max-w-sm">
    <div class="mb-8 text-center">
      <p class="font-mono text-sm mb-2" style="color: var(--accent)">Admin Panel</p>
      <h1 class="text-2xl font-medium text-neutral-100">Sign in</h1>
    </div>

    <form (ngSubmit)="submit()" class="flex flex-col gap-4">
      <div>
        <label class="block text-xs font-mono text-neutral-500 mb-2 uppercase tracking-widest">Email</label>
        <input type="email" [ngModel]="email()" (ngModelChange)="email.set($event)" name="email"
          class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-4 py-3 text-sm text-neutral-100 placeholder-neutral-600 focus:outline-none focus:border-neutral-600 transition-colors"
          placeholder="admin@email.com" required autocomplete="email">
      </div>
      <div>
        <label class="block text-xs font-mono text-neutral-500 mb-2 uppercase tracking-widest">Password</label>
        <input type="password" [ngModel]="password()" (ngModelChange)="password.set($event)" name="password"
          class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-4 py-3 text-sm text-neutral-100 placeholder-neutral-600 focus:outline-none focus:border-neutral-600 transition-colors"
          placeholder="••••••••" required autocomplete="current-password">
      </div>

      @if (error()) {
        <p class="text-sm text-red-400">{{ error() }}</p>
      }

      <button type="submit" [disabled]="loading()"
        class="mt-2 px-6 py-3 rounded-xl font-medium text-sm text-white transition-all duration-200 hover:opacity-90 disabled:opacity-50"
        style="background: var(--accent)">
        @if (loading()) { Signing in... } @else { Sign in }
      </button>
    </form>

    <p class="text-center mt-6">
      <a routerLink="/" class="text-xs text-neutral-600 hover:text-neutral-400 transition-colors">
        ← Back to portfolio
      </a>
    </p>
  </div>
</div>
