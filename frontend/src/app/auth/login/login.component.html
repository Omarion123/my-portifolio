<div class="admin-login">
  <div class="login-card card">
    <div class="login-head">
      <div class="login-mark"><span></span></div>
      <div>
        <span class="mono">portfolio.admin</span>
        <h1>Sign in</h1>
      </div>
    </div>

    <form (ngSubmit)="submit()" class="login-form">
      <div>
        <label class="field-label">Email</label>
        <input class="field" type="email" [ngModel]="email()" (ngModelChange)="email.set($event)" name="email"
          placeholder="admin@email.com" required autocomplete="email">
      </div>
      <div>
        <label class="field-label">Password</label>
        <input class="field" type="password" [ngModel]="password()" (ngModelChange)="password.set($event)" name="password"
          placeholder="••••••••" required autocomplete="current-password">
      </div>

      @if (error()) {
        <p class="login-error">{{ error() }}</p>
      }

      <button class="btn btn-primary" type="submit" [disabled]="loading()">
        @if (loading()) { Authenticating… } @else { Continue → }
      </button>

      <div class="login-fine mono">
        <span>Single-admin · JWT 24h · 2FA enabled</span>
      </div>
    </form>

    <a routerLink="/" class="btn btn-ghost btn-sm login-back">← Back to site</a>
  </div>

  <div class="login-bg" aria-hidden="true">
    <div class="login-grid"></div>
  </div>
</div>
