<section id="skills" class="section">
  <div class="wrap">

    <div [appReveal]="0" class="sec-head">
      <span class="sec-idx">03 / Skills</span>
      <h2 class="sec-title">Tools I reach for.</h2>
      <span class="sec-meta">By layer</span>
    </div>

    <div class="skills-grid">
      @for (group of portfolio.skills(); track group.group; let gi = $index) {
        <div [appReveal]="gi * 80" class="skill-col">
          <div class="skill-col-head">
            <span class="mono">{{ (gi + 1).toString().padStart(2, '0') }}</span>
            <h3>{{ group.group }}</h3>
          </div>
          <ul class="skill-list">
            @for (skill of group.items; track skill.name) {
              <li class="skill-item">
                <div class="skill-row">
                  <span>{{ skill.name }}</span>
                  <span class="mono skill-pct">{{ skill.level }}</span>
                </div>
                <div class="skill-bar">
                  <div class="skill-bar-fill" [style.width.%]="skill.level"></div>
                  <div class="skill-bar-tick" style="left: 25%"></div>
                  <div class="skill-bar-tick" style="left: 50%"></div>
                  <div class="skill-bar-tick" style="left: 75%"></div>
                </div>
              </li>
            }
          </ul>
        </div>
      }
    </div>

  </div>
</section>
