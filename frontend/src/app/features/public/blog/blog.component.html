<section id="blog" class="section">
  <div class="wrap">

    <div [appReveal]="0" class="sec-head">
      <span class="sec-idx">07 / Writing</span>
      <h2 class="sec-title">Recent posts.</h2>
      <span class="sec-meta">{{ portfolio.posts().length }} essays</span>
    </div>

    <div class="blog-list">
      @for (post of portfolio.posts(); track post._id; let i = $index) {
        <div [appReveal]="i * 80" class="blog-row">
          <div class="blog-date mono">{{ post.date }}</div>
          <div class="blog-main">
            <h3 class="blog-title">{{ post.title }}</h3>
            <p class="blog-excerpt">{{ post.excerpt }}</p>
          </div>
          <div class="blog-meta">
            <span class="chip">{{ post.tag }}</span>
            <span class="mono blog-read">{{ post.readMin }} min</span>
            <span class="blog-arrow" aria-hidden>→</span>
          </div>
        </div>
      }
    </div>

  </div>
</section>
