<section id="hero"
  class="relative min-h-screen flex flex-col justify-center px-6 md:px-12 lg:px-24 pt-16 overflow-hidden bg-surface">

  <!-- Background blobs -->
  <div class="absolute inset-0 -z-10 overflow-hidden" aria-hidden="true">
    <div class="absolute top-1/4 -left-16 w-[40rem] h-[40rem] rounded-full opacity-25 blur-3xl"
      style="background: var(--accent-glow)"></div>
    <div class="absolute bottom-1/4 right-0 w-64 h-64 rounded-full opacity-15 blur-3xl"
      style="background: var(--accent-2)"></div>
  </div>

  <div class="max-w-7xl mx-auto w-full">

    <!-- Available badge -->
    @if (portfolio.identity().available) {
      <div class="inline-flex items-center gap-2 mb-8 px-3 py-1.5 rounded-full border border-base bg-card">
        <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
        <span class="text-xs text-muted">Available for opportunities</span>
      </div>
    }

    <!-- Name -->
    <h1 class="text-5xl md:text-7xl lg:text-[5.5rem] font-medium tracking-tight text-primary mb-4 leading-none">
      {{ portfolio.identity().name }}
    </h1>

    <!-- Title -->
    <p class="text-xl md:text-2xl font-mono mb-6 text-accent">
      {{ portfolio.identity().title }}
    </p>

    <!-- Tagline -->
    <p class="text-lg md:text-xl text-muted max-w-2xl mb-12 leading-relaxed">
      {{ portfolio.identity().tagline }}
    </p>

    <!-- CTAs -->
    <div class="flex flex-wrap gap-4">
      <button (click)="scrollTo('#projects')"
        class="px-6 py-3 rounded-xl font-medium text-sm text-white transition-all duration-200 hover:opacity-90 hover:scale-[1.02] active:scale-[0.98]"
        style="background: var(--accent)">
        View Projects
      </button>
      <button (click)="scrollTo('#contact')"
        class="px-6 py-3 rounded-xl font-medium text-sm border border-base text-muted hover:border-base-2 hover:text-primary transition-all duration-200">
        Get in Touch
      </button>
    </div>
  </div>

  <!-- Scroll hint -->
  <div class="absolute bottom-12 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 text-faint">
    <span class="text-xs font-mono">scroll</span>
    <svg class="w-4 h-4 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
    </svg>
  </div>
</section>
