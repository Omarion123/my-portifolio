<div>
  <div [appReveal]="0" class="sec-head">
    <span class="sec-idx">06 / Certifications</span>
    <h2 class="sec-title">Earned.</h2>
  </div>
  <div class="cert-list">
    @for (cert of portfolio.certifications(); track cert._id; let i = $index) {
      <div [appReveal]="i * 80" class="cert-item card">
        <div class="cert-badge" aria-hidden>
          <svg viewBox="0 0 40 40" width="32" height="32">
            <circle cx="20" cy="20" r="14" fill="none" stroke="currentColor" stroke-width="1.2"/>
            <circle cx="20" cy="20" r="9"  fill="none" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
            <circle cx="20" cy="20" r="3"  fill="currentColor"/>
          </svg>
        </div>
        <div class="cert-body">
          <h3 class="cert-name">{{ cert.name }}</h3>
          <div class="cert-meta mono">
            <span>{{ cert.org }}</span>
            <span>·</span>
            <span>{{ cert.year }}</span>
          </div>
        </div>
      </div>
    }
  </div>
</div>
