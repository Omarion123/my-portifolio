<div class="adm">

  <aside class="adm-side">
    <div class="adm-side-head">
      <div class="adm-mark"><span></span></div>
      <div>
        <div class="adm-side-title">Portfolio</div>
        <div class="mono adm-side-sub">admin · v1.0.0</div>
      </div>
    </div>

    <nav class="adm-nav">
      <div class="adm-nav-group mono">Manage</div>
      @for (item of navItems; track item.path) {
        <a [routerLink]="item.path"
          routerLinkActive="adm-nav-active"
          [routerLinkActiveOptions]="{ exact: item.path === '/admin' }"
          class="adm-nav-item">
          <span class="adm-nav-icon">{{ item.icon }}</span>
          <span class="adm-nav-label">{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="adm-side-foot">
      <button (click)="logout()" class="btn btn-ghost btn-sm">Sign out</button>
      <a routerLink="/" class="btn btn-ghost btn-sm">↗ Site</a>
    </div>
  </aside>

  <div class="adm-main">
    <div class="adm-body">
      <router-outlet />
    </div>
  </div>

</div>
