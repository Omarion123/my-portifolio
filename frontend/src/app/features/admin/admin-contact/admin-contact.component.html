<div class="adm-page">

  <div class="adm-page-head">
    <div>
      <h1>Contact info</h1>
      <p class="adm-page-sub">Update your contact details shown on the portfolio.</p>
    </div>
  </div>

  <div class="card adm-form" style="max-width: 560px;">
    <div>
      <label class="field-label">Email</label>
      <input class="field" type="email" name="email"
        [ngModel]="portfolio.identity().email"
        (ngModelChange)="portfolio.updateSection('identity', { ...portfolio.identity(), email: $event })">
    </div>
    <div>
      <label class="field-label">GitHub URL</label>
      <input class="field" name="github"
        [ngModel]="portfolio.identity().github"
        (ngModelChange)="portfolio.updateSection('identity', { ...portfolio.identity(), github: $event })">
    </div>
    <div>
      <label class="field-label">LinkedIn URL</label>
      <input class="field" name="linkedin"
        [ngModel]="portfolio.identity().linkedin"
        (ngModelChange)="portfolio.updateSection('identity', { ...portfolio.identity(), linkedin: $event })">
    </div>
    <div>
      <label class="field-label">Location</label>
      <input class="field" name="location"
        [ngModel]="portfolio.identity().location"
        (ngModelChange)="portfolio.updateSection('identity', { ...portfolio.identity(), location: $event })">
    </div>
    <div class="adm-check">
      <input type="checkbox" id="available" name="available"
        [ngModel]="portfolio.identity().available"
        (ngModelChange)="portfolio.updateSection('identity', { ...portfolio.identity(), available: $event })">
      <label for="available">Available for opportunities</label>
    </div>
    <div class="adm-drawer-foot">
      <button (click)="save()" class="btn btn-primary">Save changes</button>
    </div>
  </div>

</div>
