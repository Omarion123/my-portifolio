<div>
  <h1 class="text-2xl font-medium text-neutral-100 mb-2">Contact info</h1>
  <p class="text-sm text-neutral-400 mb-8">Update your contact details shown on the portfolio.</p>

  <div class="card max-w-xl">
    <div class="flex flex-col gap-4">
      <div>
        <label class="block text-xs font-mono text-neutral-500 mb-1.5">Email</label>
        <input [ngModel]="portfolio.identity().email"
          (ngModelChange)="portfolio.updateSection('identity', { ...portfolio.identity(), email: $event })"
          name="email" type="email"
          class="w-full bg-neutral-800 border border-neutral-700 rounded-lg px-3 py-2 text-sm text-neutral-100 focus:outline-none">
      </div>
      <div>
        <label class="block text-xs font-mono text-neutral-500 mb-1.5">GitHub URL</label>
        <input [ngModel]="portfolio.identity().github"
          (ngModelChange)="portfolio.updateSection('identity', { ...portfolio.identity(), github: $event })"
          name="github"
          class="w-full bg-neutral-800 border border-neutral-700 rounded-lg px-3 py-2 text-sm text-neutral-100 focus:outline-none">
      </div>
      <div>
        <label class="block text-xs font-mono text-neutral-500 mb-1.5">LinkedIn URL</label>
        <input [ngModel]="portfolio.identity().linkedin"
          (ngModelChange)="portfolio.updateSection('identity', { ...portfolio.identity(), linkedin: $event })"
          name="linkedin"
          class="w-full bg-neutral-800 border border-neutral-700 rounded-lg px-3 py-2 text-sm text-neutral-100 focus:outline-none">
      </div>
      <div>
        <label class="block text-xs font-mono text-neutral-500 mb-1.5">Location</label>
        <input [ngModel]="portfolio.identity().location"
          (ngModelChange)="portfolio.updateSection('identity', { ...portfolio.identity(), location: $event })"
          name="location"
          class="w-full bg-neutral-800 border border-neutral-700 rounded-lg px-3 py-2 text-sm text-neutral-100 focus:outline-none">
      </div>
      <div class="flex items-center gap-2">
        <input type="checkbox"
          [ngModel]="portfolio.identity().available"
          (ngModelChange)="portfolio.updateSection('identity', { ...portfolio.identity(), available: $event })"
          name="available" id="available" class="w-4 h-4 rounded">
        <label for="available" class="text-sm text-neutral-300">Available for opportunities</label>
      </div>
    </div>

    <div class="mt-6 pt-6 border-t border-neutral-800 flex items-center gap-3">
      <button (click)="save()" class="px-4 py-2 rounded-lg text-sm font-medium text-white" style="background: var(--accent)">Save changes</button>
      @if (saved) {
        <span class="text-sm text-emerald-400">Saved!</span>
      }
    </div>
  </div>
</div>
