<div class="adm-page">

  <div class="adm-page-head">
    <div>
      <h1>Education</h1>
      <p class="adm-page-sub">{{ portfolio.education().length }} entries</p>
    </div>
    <div class="adm-page-actions">
      <button (click)="startNew()" class="btn btn-primary">+ Add</button>
    </div>
  </div>

  @if (editing) {
    <div class="card adm-form">
      <h2>{{ editing._id ? 'Edit' : 'New' }} education</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="field-label">Degree *</label>
          <input class="field" [(ngModel)]="editing.degree" name="degree">
        </div>
        <div>
          <label class="field-label">Institution *</label>
          <input class="field" [(ngModel)]="editing.org" name="org">
        </div>
        <div>
          <label class="field-label">From</label>
          <input class="field" [(ngModel)]="editing.from" name="from">
        </div>
        <div>
          <label class="field-label">To</label>
          <input class="field" [(ngModel)]="editing.to" name="to">
        </div>
        <div class="md:col-span-2">
          <label class="field-label">Note</label>
          <textarea class="field" [(ngModel)]="editing.note" name="note" rows="2"></textarea>
        </div>
      </div>
      <div class="adm-drawer-foot">
        <div>
          <button (click)="save()" class="btn btn-primary">Save</button>
          <button (click)="cancel()" class="btn btn-ghost">Cancel</button>
        </div>
      </div>
    </div>
  }

  <div class="card adm-list">
    @for (ed of portfolio.education(); track ed._id) {
      <div class="adm-list-row">
        <span class="adm-list-handle mono">≡</span>
        <div class="adm-list-main">
          <h4>{{ ed.degree }}</h4>
          <p>{{ ed.org }} · {{ ed.from }}–{{ ed.to }}</p>
        </div>
        <span class="adm-list-meta mono">{{ ed.from }}</span>
        <div class="adm-list-actions">
          <button (click)="startEdit(ed)" class="btn btn-ghost btn-sm">Edit</button>
          <button (click)="delete(ed._id!)" class="btn btn-ghost btn-sm adm-danger">Delete</button>
        </div>
      </div>
    }
  </div>

</div>
