<div>
  <div class="flex items-center justify-between mb-8">
    <h1 class="text-2xl font-medium text-neutral-100">Education</h1>
    <button (click)="startNew()" class="px-4 py-2 rounded-xl text-sm font-medium text-white hover:opacity-90" style="background: var(--accent)">+ Add</button>
  </div>

  @if (editing) {
    <div class="card mb-8">
      <h2 class="text-base font-medium text-neutral-100 mb-6">{{ editing._id ? 'Edit' : 'New' }} education</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-mono text-neutral-500 mb-1.5">Degree *</label>
          <input [(ngModel)]="editing.degree" name="degree" class="w-full bg-neutral-800 border border-neutral-700 rounded-lg px-3 py-2 text-sm text-neutral-100 focus:outline-none">
        </div>
        <div>
          <label class="block text-xs font-mono text-neutral-500 mb-1.5">Institution *</label>
          <input [(ngModel)]="editing.org" name="org" class="w-full bg-neutral-800 border border-neutral-700 rounded-lg px-3 py-2 text-sm text-neutral-100 focus:outline-none">
        </div>
        <div>
          <label class="block text-xs font-mono text-neutral-500 mb-1.5">From</label>
          <input [(ngModel)]="editing.from" name="from" class="w-full bg-neutral-800 border border-neutral-700 rounded-lg px-3 py-2 text-sm text-neutral-100 focus:outline-none">
        </div>
        <div>
          <label class="block text-xs font-mono text-neutral-500 mb-1.5">To</label>
          <input [(ngModel)]="editing.to" name="to" class="w-full bg-neutral-800 border border-neutral-700 rounded-lg px-3 py-2 text-sm text-neutral-100 focus:outline-none">
        </div>
        <div class="md:col-span-2">
          <label class="block text-xs font-mono text-neutral-500 mb-1.5">Note</label>
          <textarea [(ngModel)]="editing.note" name="note" rows="2" class="w-full bg-neutral-800 border border-neutral-700 rounded-lg px-3 py-2 text-sm text-neutral-100 focus:outline-none resize-none"></textarea>
        </div>
      </div>
      <div class="flex gap-3 mt-6 pt-6 border-t border-neutral-800">
        <button (click)="save()" class="px-4 py-2 rounded-lg text-sm font-medium text-white" style="background: var(--accent)">Save</button>
        <button (click)="cancel()" class="px-4 py-2 rounded-lg text-sm text-neutral-400 border border-neutral-700">Cancel</button>
      </div>
    </div>
  }

  <div class="flex flex-col gap-3">
    @for (ed of portfolio.education(); track ed._id) {
      <div class="card flex items-center justify-between">
        <div>
          <p class="text-sm font-medium text-neutral-100">{{ ed.degree }}</p>
          <p class="text-xs text-neutral-500">{{ ed.org }} · {{ ed.from }}–{{ ed.to }}</p>
        </div>
        <div class="flex gap-2">
          <button (click)="startEdit(ed)" class="px-3 py-1.5 text-xs rounded-lg border border-neutral-700 text-neutral-400 hover:text-neutral-100 transition-colors">Edit</button>
          <button (click)="delete(ed._id!)" class="px-3 py-1.5 text-xs rounded-lg border border-neutral-700 text-red-500 hover:bg-red-500/10 transition-colors">Delete</button>
        </div>
      </div>
    }
  </div>
</div>
