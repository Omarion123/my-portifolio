<div class="adm-page">

  <div class="adm-page-head">
    <div>
      <h1>Skills</h1>
      <p class="adm-page-sub">{{ portfolio.skills().length }} groups</p>
    </div>
    <div class="adm-page-actions">
      <button (click)="save()" class="btn btn-primary">Save changes</button>
    </div>
  </div>

  <div class="adm-grid-skills">
    @for (group of portfolio.skills(); track group.group; let gi = $index) {
      <div class="card adm-skill-card">
        <div class="adm-skill-head">
          <h3>{{ group.group }}</h3>
          <span class="mono">{{ group.items.length }} skills</span>
        </div>
        @for (skill of group.items; track skill.name; let si = $index) {
          <div class="adm-skill-row">
            <span>{{ skill.name }}</span>
            <input type="range" min="0" max="100"
              [ngModel]="skill.level"
              (ngModelChange)="updateLevel(gi, si, $event)"
              [name]="'skill_' + gi + '_' + si"
              style="accent-color: var(--accent); width: 100%">
            <span class="mono">{{ skill.level }}%</span>
            <button (click)="removeSkill(gi, si)" class="adm-danger" style="background:none;border:0;cursor:pointer;font-size:16px;">×</button>
          </div>
        }
        <div style="display:flex;gap:8px;padding-top:12px;border-top:1px solid var(--line)">
          <input #nameInput type="text" placeholder="Skill name" class="field adm-skill-field" style="flex:1">
          <button (click)="addSkill(gi, nameInput.value, 75); nameInput.value = ''"
            class="btn btn-ghost btn-sm">Add</button>
        </div>
      </div>
    }
  </div>

</div>
