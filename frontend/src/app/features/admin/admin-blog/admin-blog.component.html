<div>
  <div class="flex items-center justify-between mb-8">
    <h1 class="text-2xl font-medium text-neutral-100">Blog posts</h1>
    <button (click)="startNew()" class="px-4 py-2 rounded-xl text-sm font-medium text-white hover:opacity-90" style="background: var(--accent)">+ New post</button>
  </div>

  @if (editing) {
    <div class="card mb-8">
      <h2 class="text-base font-medium text-neutral-100 mb-6">{{ editing._id ? 'Edit' : 'New' }} post</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="md:col-span-2">
          <label class="block text-xs font-mono text-neutral-500 mb-1.5">Title *</label>
          <input [(ngModel)]="editing.title" name="title" class="w-full bg-neutral-800 border border-neutral-700 rounded-lg px-3 py-2 text-sm text-neutral-100 focus:outline-none">
        </div>
        <div>
          <label class="block text-xs font-mono text-neutral-500 mb-1.5">Tag</label>
          <input [(ngModel)]="editing.tag" name="tag" class="w-full bg-neutral-800 border border-neutral-700 rounded-lg px-3 py-2 text-sm text-neutral-100 focus:outline-none">
        </div>
        <div class="md:col-span-3">
          <label class="block text-xs font-mono text-neutral-500 mb-1.5">Excerpt</label>
          <textarea [(ngModel)]="editing.excerpt" name="excerpt" rows="2" class="w-full bg-neutral-800 border border-neutral-700 rounded-lg px-3 py-2 text-sm text-neutral-100 focus:outline-none resize-none"></textarea>
        </div>
        <div class="md:col-span-3">
          <label class="block text-xs font-mono text-neutral-500 mb-1.5">Content (Markdown)</label>
          <textarea [(ngModel)]="editing.content" name="content" rows="8" class="w-full bg-neutral-800 border border-neutral-700 rounded-lg px-3 py-2 text-sm text-neutral-100 focus:outline-none resize-none font-mono"></textarea>
        </div>
        <div>
          <label class="block text-xs font-mono text-neutral-500 mb-1.5">Date</label>
          <input [(ngModel)]="editing.date" name="date" class="w-full bg-neutral-800 border border-neutral-700 rounded-lg px-3 py-2 text-sm text-neutral-100 focus:outline-none">
        </div>
        <div>
          <label class="block text-xs font-mono text-neutral-500 mb-1.5">Read time (min)</label>
          <input type="number" [(ngModel)]="editing.readMin" name="readMin" class="w-full bg-neutral-800 border border-neutral-700 rounded-lg px-3 py-2 text-sm text-neutral-100 focus:outline-none">
        </div>
        <div class="flex items-center gap-2 pt-6">
          <input type="checkbox" [(ngModel)]="editing.published" id="published" name="published" class="w-4 h-4 rounded">
          <label for="published" class="text-sm text-neutral-300">Published</label>
        </div>
      </div>
      <div class="flex gap-3 mt-6 pt-6 border-t border-neutral-800">
        <button (click)="save()" class="px-4 py-2 rounded-lg text-sm font-medium text-white" style="background: var(--accent)">Save</button>
        <button (click)="cancel()" class="px-4 py-2 rounded-lg text-sm text-neutral-400 border border-neutral-700">Cancel</button>
      </div>
    </div>
  }

  <div class="flex flex-col gap-3">
    @for (post of portfolio.posts(); track post._id) {
      <div class="card flex items-center justify-between gap-4">
        <div class="min-w-0">
          <div class="flex items-center gap-2 mb-1">
            <p class="text-sm font-medium text-neutral-100 truncate">{{ post.title }}</p>
            @if (post.published) {
              <span class="text-xs px-1.5 py-0.5 rounded text-emerald-400 bg-emerald-400/10 flex-shrink-0">Live</span>
            }
          </div>
          <p class="text-xs text-neutral-500">{{ post.tag }} · {{ post.date }} · {{ post.readMin }} min</p>
        </div>
        <div class="flex gap-2 flex-shrink-0">
          <button (click)="startEdit(post)" class="px-3 py-1.5 text-xs rounded-lg border border-neutral-700 text-neutral-400 hover:text-neutral-100 transition-colors">Edit</button>
          <button (click)="delete(post._id!)" class="px-3 py-1.5 text-xs rounded-lg border border-neutral-700 text-red-500 hover:bg-red-500/10 transition-colors">Delete</button>
        </div>
      </div>
    }
  </div>
</div>
