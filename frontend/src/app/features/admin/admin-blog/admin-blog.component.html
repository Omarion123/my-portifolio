<div class="adm-page">

  <div class="adm-page-head">
    <div>
      <h1>Blog posts</h1>
      <p class="adm-page-sub">{{ portfolio.posts().length }} posts</p>
    </div>
    <div class="adm-page-actions">
      <button (click)="startNew()" class="btn btn-primary">+ New post</button>
    </div>
  </div>

  @if (editing) {
    <div class="card adm-form">
      <h2>{{ editing._id ? 'Edit' : 'New' }} post</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="md:col-span-2">
          <label class="field-label">Title *</label>
          <input class="field" [(ngModel)]="editing.title" name="title">
        </div>
        <div>
          <label class="field-label">Tag</label>
          <input class="field" [(ngModel)]="editing.tag" name="tag">
        </div>
        <div class="md:col-span-3">
          <label class="field-label">Excerpt</label>
          <textarea class="field" [(ngModel)]="editing.excerpt" name="excerpt" rows="2"></textarea>
        </div>
        <div class="md:col-span-3">
          <label class="field-label">Content (Markdown)</label>
          <textarea class="field" [(ngModel)]="editing.content" name="content" rows="8" style="font-family: var(--f-mono); font-size: 13px;"></textarea>
        </div>
        <div>
          <label class="field-label">Date</label>
          <input class="field" [(ngModel)]="editing.date" name="date">
        </div>
        <div>
          <label class="field-label">Read time (min)</label>
          <input class="field" type="number" [(ngModel)]="editing.readMin" name="readMin">
        </div>
        <div class="adm-check" style="padding-top: 20px;">
          <input type="checkbox" [(ngModel)]="editing.published" id="published" name="published">
          <label for="published">Published</label>
        </div>
      </div>
      <div class="adm-drawer-foot">
        <div>
          <button (click)="save()" class="btn btn-primary">Save</button>
          <button (click)="cancel()" class="btn btn-ghost">Cancel</button>
        </div>
      </div>
    </div>
  }

  <div class="card adm-list">
    @for (post of portfolio.posts(); track post._id) {
      <div class="adm-list-row">
        <span class="adm-list-handle mono">≡</span>
        <div class="adm-list-main">
          <h4>
            {{ post.title }}
            @if (post.published) { <span class="chip chip-active" style="font-size:9px;padding:2px 7px;margin-left:6px;">Live</span> }
          </h4>
          <p>{{ post.tag }} · {{ post.date }} · {{ post.readMin }} min</p>
        </div>
        <span class="adm-list-meta mono">{{ post.readMin }} min</span>
        <div class="adm-list-actions">
          <button (click)="startEdit(post)" class="btn btn-ghost btn-sm">Edit</button>
          <button (click)="delete(post._id!)" class="btn btn-ghost btn-sm adm-danger">Delete</button>
        </div>
      </div>
    }
  </div>

</div>
