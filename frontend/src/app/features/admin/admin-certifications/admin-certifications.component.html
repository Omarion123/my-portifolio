<div>
  <div class="flex items-center justify-between mb-8">
    <h1 class="text-2xl font-medium text-neutral-100">Certifications</h1>
    <button (click)="startNew()" class="px-4 py-2 rounded-xl text-sm font-medium text-white hover:opacity-90" style="background: var(--accent)">+ Add</button>
  </div>

  @if (editing) {
    <div class="card mb-8">
      <h2 class="text-base font-medium text-neutral-100 mb-6">{{ editing._id ? 'Edit' : 'New' }} certification</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="md:col-span-2">
          <label class="block text-xs font-mono text-neutral-500 mb-1.5">Certification name *</label>
          <input [(ngModel)]="editing.name" name="name" class="w-full bg-neutral-800 border border-neutral-700 rounded-lg px-3 py-2 text-sm text-neutral-100 focus:outline-none">
        </div>
        <div>
          <label class="block text-xs font-mono text-neutral-500 mb-1.5">Year</label>
          <input [(ngModel)]="editing.year" name="year" class="w-full bg-neutral-800 border border-neutral-700 rounded-lg px-3 py-2 text-sm text-neutral-100 focus:outline-none">
        </div>
        <div class="md:col-span-2">
          <label class="block text-xs font-mono text-neutral-500 mb-1.5">Issuing organization *</label>
          <input [(ngModel)]="editing.org" name="org" class="w-full bg-neutral-800 border border-neutral-700 rounded-lg px-3 py-2 text-sm text-neutral-100 focus:outline-none">
        </div>
        <div>
          <label class="block text-xs font-mono text-neutral-500 mb-1.5">Link (optional)</label>
          <input [(ngModel)]="editing.link" name="link" class="w-full bg-neutral-800 border border-neutral-700 rounded-lg px-3 py-2 text-sm text-neutral-100 focus:outline-none">
        </div>
      </div>
      <div class="flex gap-3 mt-6 pt-6 border-t border-neutral-800">
        <button (click)="save()" class="px-4 py-2 rounded-lg text-sm font-medium text-white" style="background: var(--accent)">Save</button>
        <button (click)="cancel()" class="px-4 py-2 rounded-lg text-sm text-neutral-400 border border-neutral-700">Cancel</button>
      </div>
    </div>
  }

  <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
    @for (cert of portfolio.certifications(); track cert._id) {
      <div class="card flex items-center justify-between">
        <div>
          <p class="text-sm font-medium text-neutral-100">{{ cert.name }}</p>
          <p class="text-xs text-neutral-500">{{ cert.org }} · {{ cert.year }}</p>
        </div>
        <div class="flex gap-2">
          <button (click)="startEdit(cert)" class="px-3 py-1.5 text-xs rounded-lg border border-neutral-700 text-neutral-400 hover:text-neutral-100 transition-colors">Edit</button>
          <button (click)="delete(cert._id!)" class="px-3 py-1.5 text-xs rounded-lg border border-neutral-700 text-red-500 hover:bg-red-500/10 transition-colors">Delete</button>
        </div>
      </div>
    }
  </div>
</div>
