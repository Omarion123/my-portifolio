<div class="adm-page">

  <div class="adm-page-head">
    <div>
      <h1>Certifications</h1>
      <p class="adm-page-sub">{{ portfolio.certifications().length }} credentials</p>
    </div>
    <div class="adm-page-actions">
      <button (click)="startNew()" class="btn btn-primary">+ Add</button>
    </div>
  </div>

  @if (editing) {
    <div class="card adm-form">
      <h2>{{ editing._id ? 'Edit' : 'New' }} certification</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="md:col-span-2">
          <label class="field-label">Certification name *</label>
          <input class="field" [(ngModel)]="editing.name" name="name">
        </div>
        <div>
          <label class="field-label">Year</label>
          <input class="field" [(ngModel)]="editing.year" name="year">
        </div>
        <div class="md:col-span-2">
          <label class="field-label">Issuing organization *</label>
          <input class="field" [(ngModel)]="editing.org" name="org">
        </div>
        <div>
          <label class="field-label">Link (optional)</label>
          <input class="field" [(ngModel)]="editing.link" name="link">
        </div>
      </div>
      <div class="adm-drawer-foot">
        <div>
          <button (click)="save()" class="btn btn-primary">Save</button>
          <button (click)="cancel()" class="btn btn-ghost">Cancel</button>
        </div>
      </div>
    </div>
  }

  <div class="card adm-list">
    @for (cert of portfolio.certifications(); track cert._id) {
      <div class="adm-list-row">
        <span class="adm-list-handle mono">≡</span>
        <div class="adm-list-main">
          <h4>{{ cert.name }}</h4>
          <p>{{ cert.org }}</p>
        </div>
        <span class="adm-list-meta mono">{{ cert.year }}</span>
        <div class="adm-list-actions">
          <button (click)="startEdit(cert)" class="btn btn-ghost btn-sm">Edit</button>
          <button (click)="delete(cert._id!)" class="btn btn-ghost btn-sm adm-danger">Delete</button>
        </div>
      </div>
    }
  </div>

</div>
