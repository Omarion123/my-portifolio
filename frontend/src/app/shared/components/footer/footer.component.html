<footer class="foot">
  <div class="wrap foot-inner">

    <div class="foot-big">
      <span>{{ portfolio.identity().name.split(' ')[0] }}.</span>
      <span class="foot-big-dim">{{ portfolio.identity().name.split(' ').slice(1).join(' ') }}</span>
    </div>

    <div class="foot-cols">
      <div>
        <span class="mono">Local</span>
        <span>{{ portfolio.identity().location }}</span>
      </div>
      <div>
        <span class="mono">Email</span>
        <a class="ulink" [href]="'mailto:' + portfolio.identity().email">
          {{ portfolio.identity().email }}
        </a>
      </div>
      <div>
        <span class="mono">Year</span>
        <span>{{ year }}</span>
      </div>
    </div>

    <div class="foot-fine mono">
      <span>Designed and built by hand · No analytics · Angular 21</span>
      <button class="ulink" (click)="scrollTop()">Back to top ↑</button>
    </div>

  </div>
</footer>
