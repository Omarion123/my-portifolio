<header
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-300"
  [class.backdrop-blur-md]="scrolled()"
  [style.background]="scrolled() ? 'color-mix(in oklch, var(--bg) 85%, transparent)' : 'transparent'"
  [style.borderBottom]="scrolled() ? '1px solid var(--border)' : 'none'">

  <nav class="max-w-7xl mx-auto px-6 md:px-12 h-16 flex items-center justify-between">

    <!-- Logo -->
    <a href="#" (click)="scrollTo('#hero', $event)"
      class="font-mono text-sm font-medium text-primary hover:text-accent transition-colors">
      omar.dev
    </a>

    <!-- Desktop nav links -->
    <ul class="hidden md:flex items-center gap-8">
      @for (link of links; track link.href) {
        <li>
          <a [href]="link.href" (click)="scrollTo(link.href, $event)"
            class="text-sm text-muted hover:text-primary transition-colors">
            {{ link.label }}
          </a>
        </li>
      }
    </ul>

    <!-- Actions -->
    <div class="flex items-center gap-2">

      <!-- Theme toggle -->
      <button (click)="theme.toggleTheme()"
        class="p-2 rounded-lg text-muted hover:text-primary transition-colors hover:bg-card"
        [attr.aria-label]="theme.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'">
        @if (theme.theme() === 'dark') {
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
        } @else {
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        }
      </button>

      <!-- Admin link -->
      <a routerLink="/admin"
        class="hidden md:inline-flex text-xs px-3 py-1.5 rounded-lg border border-base text-muted hover:text-primary hover:border-base-2 transition-colors">
        Admin ↗
      </a>

      <!-- Mobile menu button -->
      <button class="md:hidden p-2 text-muted hover:text-primary" (click)="toggleMenu()" aria-label="Toggle menu">
        @if (menuOpen()) {
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        } @else {
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        }
      </button>
    </div>
  </nav>

  <!-- Mobile menu -->
  @if (menuOpen()) {
    <div class="md:hidden border-t border-base px-6 py-4 bg-surface">
      <ul class="flex flex-col gap-4">
        @for (link of links; track link.href) {
          <li>
            <a [href]="link.href" (click)="scrollTo(link.href, $event)"
              class="text-sm text-muted hover:text-primary transition-colors">
              {{ link.label }}
            </a>
          </li>
        }
        <li class="pt-2 border-t border-base">
          <a routerLink="/admin" class="text-sm text-muted hover:text-primary transition-colors">
            Admin ↗
          </a>
        </li>
      </ul>
    </div>
  }
</header>
