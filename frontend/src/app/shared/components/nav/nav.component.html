<nav class="nav" [class.nav-scrolled]="scrolled()">
  <div class="wrap nav-inner">

    <button class="nav-brand" (click)="scrollTo('#hero', $event)">
      <span class="nav-mark" aria-hidden>
        <span class="nav-mark-dot"></span>
      </span>
      <span class="nav-name">{{ portfolio.identity().name }}</span>
      <span class="nav-slash">/</span>
      <span class="nav-role mono">{{ portfolio.identity().title }}</span>
    </button>

    <div class="nav-links">
      @for (link of links; track link.href) {
        <button class="nav-link" (click)="scrollTo(link.href, $event)">
          {{ link.label }}
        </button>
      }
    </div>

    <div class="nav-actions">
      <button class="nav-icon" (click)="theme.toggleTheme()"
        [attr.aria-label]="theme.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'">
        {{ theme.theme() === 'dark' ? '☾' : '☀' }}
      </button>
      <a routerLink="/admin" class="btn btn-sm">
        Admin <span style="opacity: 0.5">↗</span>
      </a>
    </div>

  </div>
</nav>
